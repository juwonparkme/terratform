name: validate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.8

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Build Lambda artifacts
        run: bash scripts/build-lambda.sh

      - name: Compile Python app
        run: python -m compileall app

      - name: Run tests
        run: PYTHONPATH=app pytest -q

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: terraform -chdir=infra/envs/prod init -backend=false

      - name: Terraform validate
        run: terraform -chdir=infra/envs/prod validate
